<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>居间利润统计系统 · PROFIT STATEMENT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --bg:#080B14;--bg2:#0F1320;--bg3:#171C2E;--bg4:#1E2438;
  --gold:#C9A84C;--gold-lt:#E5C97A;--gold-dim:rgba(201,168,76,.12);--gold-dim2:rgba(201,168,76,.06);
  --text:#EAE4D8;--text-dim:#8A8070;--text-mid:#B8B0A0;
  --border:rgba(201,168,76,.22);--border2:rgba(255,255,255,.07);
  --red:#D95E5E;--green:#4DBD74;--blue:#5B9BD5;
  --r:10px;--r-lg:14px;
  --sans:'Noto Sans SC',sans-serif;--mono:'IBM Plex Mono',monospace;
  --shadow:0 4px 28px rgba(0,0,0,.55);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;line-height:1.6}
button{font-family:var(--sans)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(201,168,76,.2);border-radius:3px}

/* TOAST */
#toastBox{position:fixed;top:18px;right:18px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 16px;font-size:12px;color:var(--text);
  box-shadow:var(--shadow);animation:toastIn .28s ease forwards;display:flex;align-items:center;gap:9px;max-width:300px;pointer-events:auto}
.toast.ok{border-color:var(--green)}.toast.err{border-color:var(--red)}.toast.info{border-color:var(--blue)}
@keyframes toastIn{from{transform:translateX(110%);opacity:0}to{transform:none;opacity:1}}

/* HEADER */
.hdr{background:rgba(8,11,20,.93);border-bottom:1px solid var(--border);backdrop-filter:blur(18px);
  position:sticky;top:0;z-index:500;padding:0 20px}
.hdr-inner{max-width:1340px;margin:0 auto;display:flex;align-items:center;gap:12px;height:60px}
.hdr-brand{flex:1}
.hdr-brand h1{font-size:17px;color:var(--gold);letter-spacing:.04em;font-weight:700}
.hdr-brand p{font-size:10px;color:var(--text-dim);letter-spacing:.06em;margin-top:1px}
.hdr-btns{display:flex;gap:8px;flex-shrink:0}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;border:none;cursor:pointer;border-radius:8px;
  font-size:12px;font-weight:500;padding:7px 14px;transition:all .16s;white-space:nowrap;font-family:var(--sans)}
.btn-gold{background:linear-gradient(135deg,#D4AF5C,#A8842E);color:#1A1000;font-weight:700}
.btn-gold:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-gold:active{transform:none}
.btn-gold:disabled{opacity:.5;cursor:not-allowed;transform:none;filter:none}
.btn-outline{background:transparent;color:var(--gold);border:1px solid var(--border)}
.btn-outline:hover{background:var(--gold-dim)}
.btn-outline:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--text-mid);border:1px solid var(--border2)}
.btn-ghost:hover{background:var(--border2);color:var(--text)}
.btn-danger{background:rgba(217,94,94,.15);color:var(--red);border:1px solid rgba(217,94,94,.25)}
.btn-danger:hover{background:rgba(217,94,94,.25)}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:6px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:5px}
.btn-icon{background:none;border:none;cursor:pointer;color:var(--text-dim);padding:4px 6px;border-radius:5px;
  font-size:13px;transition:all .14s;line-height:1}
.btn-icon:hover{color:var(--red);background:rgba(217,94,94,.1)}
.btn-icon-alt{background:none;border:none;cursor:pointer;color:var(--text-dim);padding:3px 5px;border-radius:5px;
  font-size:12px;transition:all .14s;line-height:1;flex-shrink:0}
.btn-icon-alt:hover{color:var(--gold);background:var(--gold-dim)}

/* MAIN */
.main{max-width:1340px;margin:0 auto;padding:24px 20px 80px}

/* PANEL / CARD */
.panel{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-lg);padding:18px 20px;margin-bottom:16px}
.panel-title{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px;
  display:flex;align-items:center;gap:8px}
.panel-title::before{content:'';display:block;width:3px;height:14px;background:var(--gold);border-radius:2px}
.panel-sub{font-size:10px;color:var(--text-dim);font-weight:400;letter-spacing:0;text-transform:none}

/* FORM GRID */
.form-grid{display:grid;gap:10px}
.form-grid-2{grid-template-columns:1fr 1fr}
.form-grid-3{grid-template-columns:1fr 1fr 1fr}
.form-grid-4{grid-template-columns:1fr 1fr 1fr 1fr}
.form-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
label{font-size:10px;color:var(--text-dim);font-weight:500;letter-spacing:.05em;text-transform:uppercase}
.inp{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:7px 10px;
  color:var(--text);font-size:12px;font-family:var(--sans);width:100%;outline:none;
  transition:border-color .15s}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--text-dim)}
.inp.mono{font-family:var(--mono)}

/* SECTION DIVIDER */
.divider{height:1px;background:var(--border2);margin:16px 0}

/* RATE BLOCK */
.rate-block{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap}
.rate-meta{font-size:10px;color:var(--text-dim);margin-top:6px}
.rate-meta.ok{color:var(--green)}

/* RECORD TABLE */
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border2);margin-bottom:12px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl thead th{padding:8px 8px;font-size:10px;font-weight:600;text-align:left;
  color:var(--text-mid);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border2);
  white-space:nowrap}
.tbl thead th.center{text-align:center}
.tbl thead th.right{text-align:right}
.tbl tbody tr{border-bottom:1px solid var(--border2);transition:background .12s}
.tbl tbody tr:last-child{border-bottom:none}
.tbl tbody tr:hover{background:var(--bg3)}
.tbl tbody tr.is-dragging{opacity:.4;background:var(--gold-dim)}
.tbl td{padding:6px 8px;vertical-align:middle}
.tbl td.center{text-align:center}

/* Drag handle */
.drag-handle{cursor:grab;color:var(--text-dim);font-size:14px;padding:2px 4px;user-select:none;
  display:inline-flex;align-items:center;transition:color .12s}
.drag-handle:hover{color:var(--gold)}
.drag-handle:active{cursor:grabbing}

/* Table inputs */
.tbl-inp{background:transparent;border:none;border-bottom:1px solid transparent;color:var(--text);
  font-size:12px;font-family:var(--sans);width:100%;outline:none;padding:2px 0;transition:border-color .14s}
.tbl-inp:focus{border-bottom-color:var(--gold);background:rgba(201,168,76,.04);border-radius:0}
.tbl-inp.mono{font-family:var(--mono);font-size:11px}
.tbl-inp.right{text-align:right}
.tbl-inp.center{text-align:center}
.amount-cell{font-family:var(--mono);font-size:11px;color:var(--gold-lt);text-align:right;white-space:nowrap}
.amount-cell.neg{color:var(--red)}
.amount-cell.gold-strong{font-size:12px;font-weight:700;color:var(--gold-lt)}
.amount-cell.gold-strong.neg{color:var(--red)}

/* Row number */
.row-num{font-family:var(--mono);font-size:10px;color:var(--text-dim);text-align:center;min-width:24px}

/* Add row btn */
.add-row-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;cursor:pointer;color:var(--text-dim);
  font-size:12px;transition:color .14s;background:none;border:none;font-family:var(--sans)}
.add-row-btn:hover{color:var(--gold)}
.add-row-btn span{font-size:18px;line-height:1}

/* Empty state */
.empty-row{text-align:center;padding:28px 10px;color:var(--text-dim);font-size:12px}

/* Stat grid (summary boxes) */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:14px}
.summary-box{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:10px 12px}
.summary-box label{font-size:10px;color:var(--text-dim);display:block;margin-bottom:4px}
.summary-box .val{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--gold-lt)}
.summary-box .val.neg{color:var(--red)}
.summary-box.highlight{border-color:var(--gold);background:var(--gold-dim)}
.summary-box.highlight .val{font-size:17px;font-weight:700}

/* Notes editor */
.notes-list{display:flex;flex-direction:column;gap:6px}
.note-row{display:flex;align-items:center;gap:8px}
.note-row span.note-num{font-family:var(--mono);font-size:11px;color:var(--text-dim);width:16px;flex-shrink:0}
.note-row .inp{flex:1}

/* Generate PDF section */
.gen-section{display:flex;align-items:center;gap:12px;padding:16px 0;flex-wrap:wrap}
.gen-section .btn{padding:10px 22px;font-size:13px}

@media(max-width:900px){
  .form-grid-3,.form-grid-4{grid-template-columns:1fr 1fr}
}
@media(max-width:600px){
  .form-grid-2,.form-grid-3,.form-grid-4{grid-template-columns:1fr}
  .main{padding:16px 12px 60px}
  .rate-block{flex-direction:column;align-items:stretch}
}
</style>
</head>
<body>

<div id="toastBox"></div>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-inner">
    <div class="hdr-brand">
      <h1>居间利润统计系统</h1>
      <p>INTERMEDIARY PROFIT STATEMENT GENERATOR</p>
    </div>
    <div class="hdr-btns">
      <button class="btn btn-ghost btn-sm" onclick="resetDB()">↺ 重置</button>
      <button class="btn btn-outline btn-sm" onclick="saveDB()">💾 保存</button>
    </div>
  </div>
</header>

<div class="main">

  <!-- 业务方信息 -->
  <div class="panel">
    <div class="panel-title">业务方信息</div>
    <div class="form-grid form-grid-3">
      <div class="form-group">
        <label>A公司名称（收款方）</label>
        <input class="inp" id="companyAInput" placeholder="如：XX贸易有限公司" oninput="DB.settings.companyA=this.value">
      </div>
      <div class="form-group">
        <label>居间方名称（我方）</label>
        <input class="inp" id="companyBInput" placeholder="如：贵公司名称" oninput="DB.settings.companyB=this.value">
      </div>
      <div class="form-group">
        <label>客户说明（可选）</label>
        <input class="inp" id="customerNoteInput" placeholder="如：C公司及下属采购方" oninput="DB.settings.customerNote=this.value">
      </div>
    </div>
  </div>

  <!-- 汇率与分润设置 -->
  <div class="panel">
    <div class="panel-title">汇率与分润设置</div>
    <div class="rate-block">
      <div class="form-group" style="width:160px">
        <label>当前汇率 USD → CNY</label>
        <input class="inp mono" id="rateInput" type="number" step="0.0001" oninput="DB.settings.currentRate=parseFloat(this.value)||0">
      </div>
      <button class="btn btn-outline btn-sm" id="btnFetchRate" onclick="fetchLiveRate()">🔄 获取实时汇率</button>
      <button class="btn btn-ghost btn-sm" onclick="applyRateToAll()">⤓ 应用到全部记录</button>
      <div class="form-group" style="width:140px">
        <label>默认分润比例 (%)</label>
        <input class="inp mono" id="splitRatioInput" type="number" step="1" min="0" max="100" oninput="DB.settings.splitRatio=parseFloat(this.value)||0">
      </div>
    </div>
    <div class="rate-meta" id="rateMeta"></div>
  </div>

  <!-- 利润流水明细 -->
  <div class="panel">
    <div class="panel-title">利润流水明细 <span class="panel-sub">— 拖动左侧 ⠿ 调整顺序 ｜ 收款单位 USD ，其余金额单位 CNY</span></div>
    <div class="tbl-wrap">
      <table class="tbl">
        <thead>
          <tr>
            <th style="width:26px"></th>
            <th style="width:18px" class="center">#</th>
            <th style="width:104px">日期</th>
            <th style="min-width:140px">客户 / 单号</th>
            <th class="right" style="width:90px">A收款<br>(USD)</th>
            <th class="right" style="width:90px">汇率</th>
            <th class="right" style="width:100px">折算人民币<br>(CNY)</th>
            <th class="right" style="width:90px">产品成本<br>(CNY)</th>
            <th class="right" style="width:80px">运费<br>(CNY)</th>
            <th class="right" style="width:100px">总利润<br>(CNY)</th>
            <th class="center" style="width:60px">分成%</th>
            <th class="right" style="width:100px">我的利润<br>(CNY)</th>
            <th style="width:30px"></th>
          </tr>
        </thead>
        <tbody id="recTbody"></tbody>
      </table>
    </div>
    <button class="add-row-btn" onclick="addRecord()"><span>＋</span> 添加流水记录</button>

    <div class="stat-grid">
      <div class="summary-box">
        <label>记录笔数</label>
        <div class="val" id="statCount">0</div>
      </div>
      <div class="summary-box">
        <label>总收款 (USD)</label>
        <div class="val" id="statUSD">USD 0.00</div>
      </div>
      <div class="summary-box">
        <label>折算人民币 (CNY)</label>
        <div class="val" id="statCNY">¥0.00</div>
      </div>
      <div class="summary-box">
        <label>总成本 (CNY)</label>
        <div class="val" id="statCost">¥0.00</div>
      </div>
      <div class="summary-box">
        <label>总运费 (CNY)</label>
        <div class="val" id="statFreight">¥0.00</div>
      </div>
      <div class="summary-box">
        <label>总利润 (CNY)</label>
        <div class="val" id="statTP">¥0.00</div>
      </div>
      <div class="summary-box highlight">
        <label>我的利润合计 (CNY)</label>
        <div class="val" id="statMP">¥0.00</div>
      </div>
    </div>
  </div>

  <!-- 报表设置 -->
  <div class="panel">
    <div class="panel-title">报表设置</div>
    <div class="form-grid form-grid-3">
      <div class="form-group">
        <label>报表标题</label>
        <input class="inp" id="reportTitleInput" oninput="DB.settings.reportTitle=this.value">
      </div>
      <div class="form-group">
        <label>统计期间起</label>
        <input class="inp" id="periodStartInput" type="date" oninput="DB.settings.periodStart=this.value">
      </div>
      <div class="form-group">
        <label>统计期间止</label>
        <input class="inp" id="periodEndInput" type="date" oninput="DB.settings.periodEnd=this.value">
      </div>
    </div>
  </div>

  <!-- 备注 -->
  <div class="panel">
    <div class="panel-title">备注 NOTES</div>
    <div id="notesList" class="notes-list"></div>
    <div style="margin-top:8px">
      <button class="btn btn-ghost btn-xs" onclick="addNote()">＋ 添加备注</button>
    </div>
  </div>

  <div class="gen-section">
    <button class="btn btn-gold" onclick="generateProfitPDF()">⬇ 生成利润统计报表 PDF</button>
    <span style="font-size:11px;color:var(--text-dim)">将按当前流水明细生成 PROFIT STATEMENT PDF</span>
  </div>

</div><!-- /main -->

<script>
/* ═══════════════════════════════
   DEFAULT DATA
═══════════════════════════════ */
const DEFAULT_DB = {
  settings:{
    companyA:'', companyB:'', customerNote:'',
    currentRate: 7.15, rateSource:'手动设置', rateUpdatedAt:'',
    splitRatio: 50,
    reportTitle:'居间利润统计报表',
    periodStart:'', periodEnd:''
  },
  records:[],
  notes:['人民币折算金额按打款当日实时汇率计算，最终以银行实际结汇金额为准。']
};

let DB = JSON.parse(JSON.stringify(DEFAULT_DB));
let sortableRec = null;

/* ═══════════════════════════════
   ID GENERATOR
═══════════════════════════════ */
function uid(){ return 'r' + Date.now() + Math.random().toString(36).slice(2,6); }

/* ═══════════════════════════════
   TOAST
═══════════════════════════════ */
function toast(msg, type='ok'){
  const box = document.getElementById('toastBox');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  const icons = {ok:'✓',err:'✕',info:'ℹ'};
  el.innerHTML = `<span class="toast-icon">${icons[type]||'ℹ'}</span>${msg}`;
  box.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(110%)';el.style.transition='all .3s';
    setTimeout(()=>el.remove(),320)}, 2800);
}

/* ═══════════════════════════════
   HELPERS
═══════════════════════════════ */
function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function setVal(id, val){ const el = document.getElementById(id); if(el) el.value = val ?? ''; }
function setText(id, val){ const el = document.getElementById(id); if(el) el.textContent = val; }
function fmtCNY(n){ return '¥' + (parseFloat(n)||0).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtUSDv(n){ return 'USD ' + (parseFloat(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

/* ═══════════════════════════════
   SAVE / LOAD / RESET
═══════════════════════════════ */
function saveDB(){
  try{ localStorage.setItem('profitStatsDB', JSON.stringify(DB)); toast('已保存到本地浏览器','ok'); }
  catch(e){ toast('保存失败: '+e.message,'err'); }
}
function loadDB(){
  try{
    const raw = localStorage.getItem('profitStatsDB');
    if(raw){ DB = JSON.parse(raw); }
    if(!DB.settings) DB.settings = JSON.parse(JSON.stringify(DEFAULT_DB.settings));
    if(!DB.records) DB.records = [];
    if(!DB.notes) DB.notes = [];
  }catch(e){ console.warn('加载失败',e); }
}
function resetDB(){
  if(!confirm('确定重置所有数据？这将清空全部流水记录，此操作不可撤销。')) return;
  DB = JSON.parse(JSON.stringify(DEFAULT_DB));
  localStorage.removeItem('profitStatsDB');
  renderAll();
  toast('已重置为默认数据','info');
}

/* ═══════════════════════════════
   RENDER ALL
═══════════════════════════════ */
function renderAll(){
  setVal('companyAInput', DB.settings.companyA);
  setVal('companyBInput', DB.settings.companyB);
  setVal('customerNoteInput', DB.settings.customerNote);
  setVal('rateInput', DB.settings.currentRate);
  setVal('splitRatioInput', DB.settings.splitRatio);
  setVal('reportTitleInput', DB.settings.reportTitle);
  setVal('periodStartInput', DB.settings.periodStart);
  setVal('periodEndInput', DB.settings.periodEnd);
  renderRateMeta();
  renderNotes();
  renderRecords();
}

/* ═══════════════════════════════
   EXCHANGE RATE
═══════════════════════════════ */
async function fetchLiveRate(){
  const btn = document.getElementById('btnFetchRate');
  if(btn){ btn.disabled = true; btn.textContent = '获取中...'; }
  let rate = null, source = '';
  try{
    const res = await fetch('https://api.frankfurter.app/latest?from=USD&to=CNY');
    if(res.ok){
      const data = await res.json();
      if(data && data.rates && data.rates.CNY){ rate = data.rates.CNY; source = 'Frankfurter（欧洲央行参考汇率）'; }
    }
  }catch(e1){ /* try fallback */ }
  if(!rate){
    try{
      const res2 = await fetch('https://open.er-api.com/v6/latest/USD');
      if(res2.ok){
        const data2 = await res2.json();
        if(data2 && data2.rates && data2.rates.CNY){ rate = data2.rates.CNY; source = 'ExchangeRate-API'; }
      }
    }catch(e2){ /* both failed */ }
  }
  if(rate){
    DB.settings.currentRate = rate;
    DB.settings.rateSource = source;
    DB.settings.rateUpdatedAt = new Date().toLocaleString('zh-CN');
    setVal('rateInput', rate.toFixed(4));
    renderRateMeta();
    toast(`汇率已更新：1 USD ≈ ${rate.toFixed(4)} CNY`, 'ok');
  } else {
    toast('获取实时汇率失败，请检查网络或手动输入汇率', 'err');
  }
  if(btn){ btn.disabled = false; btn.textContent = '🔄 获取实时汇率'; }
}
function renderRateMeta(){
  const el = document.getElementById('rateMeta');
  if(!el) return;
  if(DB.settings.rateUpdatedAt){
    el.textContent = `来源：${DB.settings.rateSource} ｜ 更新于 ${DB.settings.rateUpdatedAt}`;
    el.classList.add('ok');
  } else {
    el.textContent = '尚未获取实时汇率，可点击「获取实时汇率」或手动输入。';
    el.classList.remove('ok');
  }
}
function applyRateToRow(id){
  const r = DB.records.find(x=>x.id===id);
  if(!r) return;
  r.rate = DB.settings.currentRate || 0;
  renderRecords();
  toast('已套用当前汇率', 'ok');
}
function applyRateToAll(){
  if(!DB.records.length){ toast('暂无记录', 'info'); return; }
  DB.records.forEach(r => r.rate = DB.settings.currentRate || 0);
  renderRecords();
  toast('已将当前汇率套用到全部记录', 'ok');
}

/* ═══════════════════════════════
   RECORD CALC
═══════════════════════════════ */
function calcRecord(r){
  const usd = parseFloat(r.usdAmount) || 0;
  const rate = parseFloat(r.rate) || 0;
  const cost = parseFloat(r.productCost) || 0;
  const freight = parseFloat(r.freight) || 0;
  const ratio = parseFloat(r.ratio) || 0;
  const cny = usd * rate;
  const totalProfit = cny - cost - freight;
  const myProfit = totalProfit * (ratio / 100);
  return { usd, rate, cost, freight, ratio, cny, totalProfit, myProfit };
}

/* ═══════════════════════════════
   ADD / DELETE RECORD
═══════════════════════════════ */
function addRecord(){
  DB.records.push({
    id: uid(),
    date: new Date().toISOString().slice(0,10),
    customer: '',
    usdAmount: 0,
    rate: DB.settings.currentRate || 0,
    productCost: 0,
    freight: 0,
    ratio: DB.settings.splitRatio || 50
  });
  renderRecords();
  setTimeout(()=>{
    const tbody = document.getElementById('recTbody');
    if(!tbody) return;
    const rows = tbody.querySelectorAll('tr[data-id]');
    if(rows.length){
      const inp = rows[rows.length-1].querySelector('.tbl-inp');
      if(inp) inp.focus();
    }
  },50);
}
function deleteRecord(id){
  DB.records = DB.records.filter(r=>r.id!==id);
  renderRecords();
  toast('已删除记录', 'info');
}
function setRecord(id, field, val){
  const r = DB.records.find(x=>x.id===id);
  if(!r) return;
  r[field] = val;
  updateRowCalc(id);
  renderTotals();
}
function updateRowCalc(id){
  const r = DB.records.find(x=>x.id===id);
  if(!r) return;
  const c = calcRecord(r);
  const row = document.querySelector(`tr[data-id="${id}"]`);
  if(!row) return;
  const cnyCell = row.querySelector('.cell-cny');
  const tpCell = row.querySelector('.cell-tp');
  const mpCell = row.querySelector('.cell-mp');
  if(cnyCell) cnyCell.textContent = fmtCNY(c.cny);
  if(tpCell){ tpCell.textContent = fmtCNY(c.totalProfit); tpCell.classList.toggle('neg', c.totalProfit<0); }
  if(mpCell){ mpCell.textContent = fmtCNY(c.myProfit); mpCell.classList.toggle('neg', c.myProfit<0); }
}

/* ═══════════════════════════════
   RENDER RECORDS
═══════════════════════════════ */
function renderRecords(){
  const tbody = document.getElementById('recTbody');
  if(!tbody) return;
  if(!DB.records.length){
    tbody.innerHTML = `<tr><td colspan="13" class="empty-row">暂无记录，点击下方「＋ 添加流水记录」开始统计</td></tr>`;
  } else {
    tbody.innerHTML = DB.records.map((r,i)=>{
      const c = calcRecord(r);
      return `<tr data-id="${r.id}">
        <td><span class="drag-handle" title="拖动排序">⠿</span></td>
        <td class="row-num center">${i+1}</td>
        <td><input class="tbl-inp" type="date" value="${r.date||''}" oninput="setRecord('${r.id}','date',this.value)"></td>
        <td><input class="tbl-inp" value="${escH(r.customer)}" placeholder="C公司客户名 / PI编号" oninput="setRecord('${r.id}','customer',this.value)"></td>
        <td><input class="tbl-inp right mono" type="number" step="0.01" value="${c.usd}" oninput="setRecord('${r.id}','usdAmount',parseFloat(this.value)||0)"></td>
        <td>
          <div style="display:flex;align-items:center;gap:2px">
            <input class="tbl-inp right mono" type="number" step="0.0001" value="${c.rate}" oninput="setRecord('${r.id}','rate',parseFloat(this.value)||0)" style="width:62px">
            <button class="btn-icon-alt" title="套用当前汇率" onclick="applyRateToRow('${r.id}')">⟳</button>
          </div>
        </td>
        <td class="amount-cell cell-cny">${fmtCNY(c.cny)}</td>
        <td><input class="tbl-inp right mono" type="number" step="0.01" value="${c.cost}" oninput="setRecord('${r.id}','productCost',parseFloat(this.value)||0)"></td>
        <td><input class="tbl-inp right mono" type="number" step="0.01" value="${c.freight}" oninput="setRecord('${r.id}','freight',parseFloat(this.value)||0)"></td>
        <td class="amount-cell cell-tp ${c.totalProfit<0?'neg':''}">${fmtCNY(c.totalProfit)}</td>
        <td><input class="tbl-inp center mono" type="number" step="1" min="0" max="100" value="${c.ratio}" oninput="setRecord('${r.id}','ratio',parseFloat(this.value)||0)"></td>
        <td class="amount-cell gold-strong cell-mp ${c.myProfit<0?'neg':''}">${fmtCNY(c.myProfit)}</td>
        <td><button class="btn-icon" onclick="deleteRecord('${r.id}')" title="删除">✕</button></td>
      </tr>`;
    }).join('');
  }
  initSortableRecords();
  renderTotals();
}

/* ═══════════════════════════════
   TOTALS
═══════════════════════════════ */
function renderTotals(){
  let sumUSD=0,sumCNY=0,sumCost=0,sumFreight=0,sumTP=0,sumMP=0;
  DB.records.forEach(r=>{
    const c = calcRecord(r);
    sumUSD += c.usd; sumCNY += c.cny; sumCost += c.cost;
    sumFreight += c.freight; sumTP += c.totalProfit; sumMP += c.myProfit;
  });
  setText('statCount', DB.records.length);
  setText('statUSD', fmtUSDv(sumUSD));
  setText('statCNY', fmtCNY(sumCNY));
  setText('statCost', fmtCNY(sumCost));
  setText('statFreight', fmtCNY(sumFreight));
  setText('statTP', fmtCNY(sumTP));
  setText('statMP', fmtCNY(sumMP));
  const tpEl = document.getElementById('statTP'); if(tpEl) tpEl.classList.toggle('neg', sumTP<0);
  const mpEl = document.getElementById('statMP'); if(mpEl) mpEl.classList.toggle('neg', sumMP<0);
}

/* ═══════════════════════════════
   SORTABLE
═══════════════════════════════ */
function initSortableRecords(){
  const tbody = document.getElementById('recTbody');
  if(!tbody) return;
  if(sortableRec){ sortableRec.destroy(); sortableRec = null; }
  if(!DB.records.length) return;
  sortableRec = Sortable.create(tbody, {
    handle:'.drag-handle', animation:150,
    ghostClass:'is-dragging', chosenClass:'is-dragging',
    onEnd:()=>{
      const rows = tbody.querySelectorAll('tr[data-id]');
      const newOrder = Array.from(rows).map(tr=>tr.dataset.id);
      DB.records = newOrder.map(id=>DB.records.find(r=>r.id===id)).filter(Boolean);
      renderRecords();
      toast('顺序已调整', 'info');
    }
  });
}

/* ═══════════════════════════════
   PDF SHARED STYLES
═══════════════════════════════ */
const PDF_CLR = {
  navy: [219, 154, 53],
  gold: [201, 168, 76],
  grayHeader: [245, 240, 230],
  grayRow: [250, 247, 242],
  grayBorder: [200, 200, 200],
  grayText: [100, 100, 100],
  white: [255, 255, 255],
  black: [40, 40, 45],
  red: [180, 60, 60]
};

function drawTitleBlock(doc, mainTitle){
  const pw = doc.internal.pageSize.getWidth();
  const ml = 14, topPad = 14, blockH = 28, botPad = 12;
  doc.setFillColor(...PDF_CLR.navy);
  doc.rect(ml, topPad, pw - 2*ml, blockH, 'F');
  doc.setFontSize(22);
  doc.setFont('helvetica','bold');
  doc.setTextColor(...PDF_CLR.white);
  doc.text(mainTitle, pw/2, topPad + blockH/2 + 4, { align:'center' });
  return topPad + blockH + botPad;
}

function drawInfoSection(doc, startY, leftTitle, leftBody, rightTitle, rightBody, bodyH){
  const pw = doc.internal.pageSize.getWidth();
  const ml = 14, gap = 10;
  const colW = (pw - 2*ml - gap) / 2;
  const headerH = 7;
  if(bodyH === undefined) bodyH = 26;

  doc.setFillColor(...PDF_CLR.grayHeader);
  doc.rect(ml, startY, colW, headerH, 'F');
  doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(...PDF_CLR.black);
  doc.text(leftTitle, ml+2, startY+5);
  doc.setDrawColor(...PDF_CLR.grayBorder); doc.setLineWidth(0.3);
  doc.rect(ml, startY+headerH, colW, bodyH);
  doc.setFontSize(8.5); doc.setFont('helvetica','normal'); doc.setTextColor(...PDF_CLR.black);
  doc.text(doc.splitTextToSize(leftBody, colW-4), ml+2, startY+headerH+5);

  const rightX = ml + colW + gap;
  doc.setFillColor(...PDF_CLR.grayHeader);
  doc.rect(rightX, startY, colW, headerH, 'F');
  doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(...PDF_CLR.black);
  doc.text(rightTitle, rightX+2, startY+5);
  doc.rect(rightX, startY+headerH, colW, bodyH);
  doc.setFontSize(8.5); doc.setFont('helvetica','normal'); doc.setTextColor(...PDF_CLR.black);
  doc.text(doc.splitTextToSize(rightBody, colW-4), rightX+2, startY+headerH+5);

  return startY + headerH + bodyH + 4;
}

function drawSeparatorLine(doc, y){
  const pw = doc.internal.pageSize.getWidth();
  const ml = 14;
  doc.setDrawColor(...PDF_CLR.navy);
  doc.setLineWidth(1.5);
  doc.line(ml, y, pw-ml, y);
  return y + 6;
}

function drawFooter(doc, docName, pageNum, totalPages){
  const pw = doc.internal.pageSize.getWidth();
  const ph = doc.internal.pageSize.getHeight();
  const ml = 14;
  doc.setDrawColor(...PDF_CLR.grayBorder); doc.setLineWidth(0.3);
  doc.line(ml, ph-12, pw-ml, ph-12);
  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(...PDF_CLR.grayText);
  doc.text(docName, ml, ph-6);
  doc.text(`${pageNum} / ${totalPages}`, pw-ml, ph-6, { align:'right' });
}

    </tr></thead><tbody>`;
  rows.forEach(r => {
    tblHtml += `<tr style="border-bottom:1px solid #ddd">
      <td style="padding:5px 4px">${escH(r[0])}</td>
      <td style="padding:5px 4px">${escH(r[1])}</td>
      <td style="padding:5px 4px;text-align:right">${r[2]}</td>
      <td style="padding:5px 4px;text-align:right">${r[3]}</td>
      <td style="padding:5px 4px;text-align:right">${r[4]}</td>
      <td style="padding:5px 4px;text-align:right">${r[5]}</td>
      <td style="padding:5px 4px;text-align:right">${r[6]}</td>
      <td style="padding:5px 4px;text-align:right">${r[7]}</td>
      <td style="padding:5px 4px;text-align:center">${r[8]}</td>
      <td style="padding:5px 4px;text-align:right;font-weight:700">${r[9]}</td>
    </tr>`;
  });
  // Total row
  tblHtml += `<tr style="background:rgb(${O.navy.join(',')});color:#fff;font-weight:700">
    <td colspan="2" style="padding:6px 4px">合计 TOTAL</td>
    <td style="padding:6px 4px;text-align:right">${sumUSD.toFixed(2)}</td>
    <td style="padding:6px 4px;text-align:right"></td>
    <td style="padding:6px 4px;text-align:right">${sumCNY.toFixed(2)}</td>

  const titleTxt = escH(DB.settings.reportTitle || '居间利润统计报表');

    <div style="background:rgb(${O.navy.join(',')});color:#fff;border-radius:4px;padding:8px 12px;margin-top:10px;display:flex;justify-content:space-between;align-items:center">

  `;

  // Use html2canvas to render with proper Chinese fonts
  html2canvas(container, {
    scale: 2,
    useCORS: true,
    logging: false,
    backgroundColor: '#ffffff',
    windowWidth: 1120
  }).then(canvas => {
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const imgW = pw - 2*ml;
    const imgH = (canvas.height / canvas.width) * imgW;
    const totalH = imgH;

    // Handle multi-page
    let remainingH = totalH;
    let yOffset = 0;
    let pageNum = 1;

    while(remainingH > 0){
      if(pageNum > 1) doc.addPage();
      const pageH = ph - 24; // usable height per page
      const srcY = yOffset;
      const srcH = Math.min(pageH * (imgW / pw), remainingH);

      // Clip and render portion of canvas
      const pageCanvas = document.createElement('canvas');
      pageCanvas.width = canvas.width;
      pageCanvas.height = Math.ceil(srcH * (canvas.width / imgW));
      const ctx = pageCanvas.getContext('2d');
      const srcCanvasH = Math.ceil(srcH * (canvas.width / imgW));
      ctx.drawImage(canvas, 0, yOffset * (canvas.width / imgW), canvas.width, srcCanvasH, 0, 0, canvas.width, srcCanvasH);

      const pageImgData = pageCanvas.toDataURL('image/jpeg', 0.95);
      doc.addImage(pageImgData, 'JPEG', ml, 12, imgW, srcH);

      // Footer

      doc.text('PROFIT STATEMENT', ml, ph-8);
      doc.text(`Page ${pageNum}`, pw-ml, ph-8, { align:'right' });

      yOffset += srcH;
      remainingH -= srcH;
      pageNum++;
    }

    const fname = `利润统计报表_${DB.settings.periodStart||'起'}_${DB.settings.periodEnd||'止'}.pdf`;
    doc.save(fname);
    toast('利润统计报表 PDF 已生成下载！', 'ok');
  }).catch(err => {

}
